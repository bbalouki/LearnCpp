<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ Memory Layout</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #060d1a;
      --bg2: #080f1d;
      --bg3: #0b1120;
      --bg4: #0c1a2e;
      --bg5: #0f172a;
      --border: #1e3a5f;
      --border2: #334155;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --text4: #475569;
      --accent: #38bdf8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .app-header {
      background: linear-gradient(135deg, var(--bg4) 0%, #0a1520 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
    }

    .header-eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .header-tag {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .header-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
    }

    .header-sub {
      font-family: monospace;
      font-size: 10px;
      color: var(--text4);
    }

    .app-header h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 4px;
      background: linear-gradient(90deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-header p {
      font-size: 13px;
      color: var(--text3);
    }

    /* NAV */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      overflow-x: auto;
      flex-shrink: 0;
    }

    nav button {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text3);
      padding: 12px 18px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      white-space: nowrap;
      transition: all .15s;
    }

    nav button:hover {
      color: var(--text2);
    }

    nav button.active {
      background: var(--bg4);
      border-bottom-color: var(--accent);
      color: var(--text);
    }

    /* CONTENT */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      max-width: 900px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 10px 32px;
      background: var(--bg);
      font-size: 11px;
      color: var(--border2);
      font-family: monospace;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* SECTION */
    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 11px;
      font-family: monospace;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .section p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.7;
    }

    .section p code,
    .section code {
      font-family: monospace;
      color: #7dd3fc;
      font-size: 12px;
    }

    /* CALLOUT */
    .callout {
      background: rgba(56, 189, 248, 0.07);
      border: 1px solid #164e63;
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.6;
      margin: 12px 0;
      display: flex;
      gap: 10px;
    }

    .callout-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .callout code {
      font-family: monospace;
      color: #7dd3fc;
      font-size: 12px;
    }

    /* MEMORY CELLS */
    .mem-row {
      margin-bottom: 16px;
    }

    .mem-row-title {
      font-size: 11px;
      color: var(--text3);
      font-family: monospace;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .mem-cells {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mem-cell-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .mem-cell {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      color: #0f172a;
      border-radius: 4px;
    }

    .mem-label {
      font-size: 9px;
      color: var(--text2);
      font-family: monospace;
    }

    /* BIT STRIP  */
    .bit-strip {
      display: flex;
      gap: 2px;
      font-family: monospace;
    }

    .bit {
      width: 20px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      border-radius: 3px;
      border: 1px solid var(--border2);
    }

    /* CODE BLOCK  */
    .code-wrap {
      position: relative;
      margin: 16px 0;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--border2);
      border: none;
      color: var(--text);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      z-index: 1;
    }

    .copy-btn.ok {
      background: #22c55e;
    }

    pre {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 0;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre;
    }

    /* ── MISC ── */
    .ascii-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ascii-cell {
      background: var(--bg5);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
    }

    .mini-code {
      background: var(--bg5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      line-height: 2;
    }

    .yuv-box {
      background: var(--bg5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      line-height: 2;
      color: var(--text2);
    }

    .packet {
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 4px;
    }

    .packet-label {
      font-family: monospace;
      font-size: 12px;
    }

    .packet-sub {
      font-family: monospace;
      font-size: 10px;
      color: var(--text4);
      margin-top: 2px;
    }

    .two-col {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .float-fields {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .float-field-title {
      font-size: 10px;
      font-family: monospace;
      margin-bottom: 4px;
    }

    .float-bits {
      display: flex;
      gap: 2px;
    }

    .float-bit {
      width: 20px;
      height: 26px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .wave-wrap {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 60px;
      margin-bottom: 8px;
    }

    .wave-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wave-line {
      height: 2px;
      background: var(--border2);
      width: 14px;
    }
  </style>
</head>

<body>

  <header class="app-header">
    <div class="header-eyebrow">
      <span class="header-tag">Low Level C++</span>
      <div class="header-divider"></div>
      <span class="header-sub">memory layout reference</span>
    </div>
    <h1>Data Types in Memory</h1>
    <p>From bits to characters, pixels, audio samples, and video packets</p>
  </header>

  <nav id="nav"></nav>
  <main id="content"></main>

  <footer>
    <span>All code is C++23 — compile with: g++ -std=c++23 -O2 file.cpp</span>
    <span>memory addresses are virtual (OS mapped)</span>
  </footer>

  <script>
    'use strict';

    // ═══════════════════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════════════════

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // ONE-PASS C++ TOKENIZER  (no regex interference)
    // ═══════════════════════════════════════════════════════════════════════════════

    const CPP_KW = new Set([
      'int', 'char', 'float', 'double', 'unsigned', 'signed', 'short', 'long', 'void',
      'const', 'auto', 'return', 'for', 'if', 'else', 'while', 'do', 'switch', 'case',
      'default', 'break', 'continue', 'struct', 'class', 'namespace', 'using', 'template',
      'typename', 'static', 'inline', 'extern', 'volatile', 'sizeof', 'typedef', 'enum',
      'new', 'delete', 'true', 'false', 'nullptr', 'this', 'public', 'private', 'protected',
      'virtual', 'override', 'reinterpret_cast', 'static_cast', 'dynamic_cast', 'const_cast',
      'uint8_t', 'uint16_t', 'uint32_t', 'uint64_t', 'int8_t', 'int16_t', 'int32_t', 'int64_t',
      'size_t', 'bool', 'string', 'vector', 'cout', 'cin', 'endl', 'printf', 'memcpy', 'std',
      'move', 'min', 'max', 'fill', 'sort', 'push_back', 'reserve', 'resize', 'begin', 'end',
    ]);

    const TOK_COLOR = {
      comment: '#64748b',
      string: '#86efac',
      charlit: '#fda4af',
      preproc: '#c084fc',
      number: '#fcd34d',
      keyword: '#7dd3fc',
      identifier: '#e2e8f0',
      operator: '#94a3b8',
    };

    function tokenize(src) {
      const toks = []; let i = 0, n = src.length;
      while (i < n) {
        // block comment
        if (src[i] === '/' && src[i + 1] === '*') {
          let j = i + 2; while (j < n - 1 && !(src[j] === '*' && src[j + 1] === '/')) j++; j += 2;
          toks.push({ t: 'comment', s: src.slice(i, j) }); i = j; continue;
        }
        // line comment
        if (src[i] === '/' && src[i + 1] === '/') {
          let j = i; while (j < n && src[j] !== '\n') j++;
          toks.push({ t: 'comment', s: src.slice(i, j) }); i = j; continue;
        }
        // preprocessor
        if (src[i] === '#') {
          let j = i; while (j < n && src[j] !== '\n') { if (src[j] === '\\') j++; j++; }
          toks.push({ t: 'preproc', s: src.slice(i, j) }); i = j; continue;
        }
        // string literal
        if (src[i] === '"') {
          let j = i + 1; while (j < n && src[j] !== '"') { if (src[j] === '\\') j++; j++; } j++;
          toks.push({ t: 'string', s: src.slice(i, j) }); i = j; continue;
        }
        // char literal
        if (src[i] === "'") {
          let j = i + 1; while (j < n && src[j] !== "'") { if (src[j] === '\\') j++; j++; } j++;
          toks.push({ t: 'charlit', s: src.slice(i, j) }); i = j; continue;
        }
        // number
        if (/[0-9]/.test(src[i]) || (src[i] === '.' && /[0-9]/.test(src[i + 1]))) {
          let j = i; while (j < n && /[0-9a-fA-FxXuUlLfF.]/.test(src[j])) j++;
          toks.push({ t: 'number', s: src.slice(i, j) }); i = j; continue;
        }
        // identifier / keyword
        if (/[a-zA-Z_]/.test(src[i])) {
          let j = i; while (j < n && /[a-zA-Z0-9_]/.test(src[j])) j++;
          const w = src.slice(i, j);
          toks.push({ t: CPP_KW.has(w) ? 'keyword' : 'identifier', s: w }); i = j; continue;
        }
        // whitespace (preserve exactly)
        if (/[ \t\r\n]/.test(src[i])) {
          let j = i; while (j < n && /[ \t\r\n]/.test(src[j])) j++;
          toks.push({ t: 'ws', s: src.slice(i, j) }); i = j; continue;
        }
        toks.push({ t: 'operator', s: src[i] }); i++;
      }
      return toks;
    }

    function highlight(src) {
      return tokenize(src).map(tok => {
        const safe = esc(tok.s);
        if (tok.t === 'ws') return safe;
        return '<span style="color:' + TOK_COLOR[tok.t] + '">' + safe + '</span>';
      }).join('');
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // CODE STORE  (so copy buttons can access raw source)
    // ═══════════════════════════════════════════════════════════════════════════════

    const CODE_STORE = {};
    let codeSeq = 0;

    function codeBlock(src) {
      const id = 'c' + (codeSeq++);
      CODE_STORE[id] = src;
      return '<div class="code-wrap">'
        + '<button class="copy-btn" data-id="' + id + '">copy</button>'
        + '<pre><code>' + highlight(src) + '</code></pre>'
        + '</div>';
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // VISUAL HELPERS
    // ═══════════════════════════════════════════════════════════════════════════════

    function memCell(hex, label, color, dim) {
      color = color || '#e2e8f0'; dim = dim || false;
      return '<div class="mem-cell-wrap" style="opacity:' + (dim ? 0.35 : 1) + '">'
        + '<div class="mem-cell" style="background:' + color + '">' + esc(hex) + '</div>'
        + (label ? '<span class="mem-label">' + esc(label) + '</span>' : '')
        + '</div>';
    }

    function memRow(cells, title) {
      return '<div class="mem-row">'
        + (title ? '<div class="mem-row-title">' + esc(title) + '</div>' : '')
        + '<div class="mem-cells">' + cells.join('') + '</div>'
        + '</div>';
    }

    function bitStrip(value, n, colors) {
      n = n || 8;
      let h = '<div class="bit-strip">';
      for (let i = n - 1; i >= 0; i--) {
        const b = (value >> i) & 1;
        const bg = colors ? colors[n - 1 - i] : (b ? '#38bdf8' : '#1e293b');
        const fg = b ? '#0f172a' : '#475569';
        h += '<div class="bit" style="background:' + bg + ';color:' + fg + '">' + b + '</div>';
      }
      return h + '</div>';
    }

    function section(title, body) {
      return '<div class="section"><div class="section-title">' + esc(title) + '</div>' + body + '</div>';
    }

    function callout(icon, html) {
      return '<div class="callout"><span class="callout-icon">' + icon + '</span><span>' + html + '</span></div>';
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // PANEL 1 — CHARACTERS
    // ═══════════════════════════════════════════════════════════════════════════════

    function panelChar() {
      const asciiItems = [['A', 65], ['Z', 90], ['a', 97], ['z', 122], ['0', 48], ['9', 57], [' ', 32], ['\\n', 10], ['\\0', 0]];
      return ''
        + section('What is a character in memory?',
          '<p>A <code>char</code> is <strong style="color:#e2e8f0">exactly 1 byte (8 bits)</strong> on all platforms. '
          + 'The numeric value stored is the ASCII code of the character. '
          + '<code>\'A\'</code> = decimal 65 = hex 0x41 = binary 01000001. '
          + 'Multi-byte encodings (UTF-8, UTF-16) use multiple consecutive chars for non-ASCII codepoints.</p>')

        + section("Memory layout — 'A'",
          memRow([memCell('0x41', "'A'=65", '#7dd3fc'), memCell('0x00', 'NUL', '#334155', true)], 'ADDRESS →')
          + '<div style="margin-top:10px">'
          + '<div class="mem-row-title">BIT LAYOUT (MSB → LSB)</div>'
          + bitStrip(65, 8)
          + '<div style="display:flex;gap:2px;font-family:monospace;margin-top:4px">'
          + [6, 5, 4, 3, 2, 1, 0].map(v => '<div style="width:20px;text-align:center;font-size:9px;color:#475569">2^' + v + '</div>').join('')
          + '<div style="width:20px;text-align:center;font-size:9px;color:#475569">2^0</div>'
          + '</div>'
          + '<div style="font-size:12px;color:#94a3b8;margin-top:6px;font-family:monospace">'
          + '= 0x128 + 1x64 + 0x32 + 0x16 + 0x8 + 0x4 + 0x2 + 1x1 = <span style="color:#fcd34d">65</span>'
          + '</div></div>')

        + section('C++ Code', codeBlock(
          `#include <cstdint>
#include <iostream>
#include <print>

void inspectChar(char character) {
    // A char IS an 8-bit integer — cast it to see the number
    uint8_t raw = static_cast<uint8_t>(character);

    std::println("Char   : {}", character);                // A
    std::println("Decimal: {}", static_cast<int>(raw));    // 65
    std::println("Hex    : {:x}", static_cast<int>(raw));  // 41
    std::print("Bits   : ");
    constexpr int bitSize = 8;
    for (int index = bitSize - 1; index >= 0; --index) {
        std::print("{}", (raw >> index) & 1);  // 01000001
    }
    std::println();

    std::println("Address: {}", static_cast<void*>(&character));
    std::println("Size   : {} byte", sizeof(character));  // always 1
}

// UTF-8: multi-byte characters
void inspectUTF8() {
    // The Euro sign encodes as 3 bytes in UTF-8: E2 82 AC
    const char euro[] = "\xe2\x82\xac";  // 3 bytes + NUL
    std::println("UTF-8 bytes for the Euro sign:");
    constexpr int euroBytes = 3;
    for (int index = 0; index < euroBytes; ++index) {
        std::println("  byte[{}] = 0x{:02X}", index, static_cast<uint8_t>(euro[index]));
    }
    // Output:
    //   byte[0] = 0xE2   (11100010)
    //   byte[1] = 0x82   (10000010)
    //   byte[2] = 0xAC   (10101100)
}

// Reading raw memory back as a char
void readFromMemory() {
    constexpr uint8_t rawByteValue = 0x41;  // store the number 65
    uint8_t rawByte = rawByteValue;
    char*   asChar  = reinterpret_cast<char*>(&rawByte);
    std::println("Raw 0x41 as char: {}", *asChar);  // prints 'A'
}

int main() {
    inspectChar('A');
    inspectUTF8();
    readFromMemory();
}
`))

        + section('ASCII quick reference',
          '<div class="ascii-grid">'
          + asciiItems.map(([c, v]) =>
            '<div class="ascii-cell">'
            + '<span style="color:#fda4af">\'' + c + '\'</span>'
            + '<span style="color:#64748b"> = </span>'
            + '<span style="color:#fcd34d">' + v + '</span>'
            + '<span style="color:#475569"> (0x' + v.toString(16).padStart(2, '0').toUpperCase() + ')</span>'
            + '</div>').join('')
          + '</div>')

        + callout('🧠',
          '<strong>Key insight:</strong> A <code>char</code> is nothing but a small integer. '
          + 'The "character" interpretation only exists in your code\'s semantics, in RAM it is just 8 bits. '
          + 'This is why <code>printf("%d", \'A\')</code> prints <code>65</code>.');
    }

    // ═══════════════════════════════════════════════════════════════════════════════
    // PANEL 2 — INTEGERS
    // ═══════════════════════════════════════════════════════════════════════════════

    function panelInt() {
      return ''
        + section('Integer storage fundamentals',
          '<p>Integers are stored in <strong style="color:#e2e8f0">two\'s complement</strong> (for signed) '
          + 'or plain binary (for unsigned). The CPU uses the same bit pattern, only the <em>interpretation</em> differs. '
          + 'Byte order (endianness) determines how multi-byte integers are laid out in memory.</p>')

        + section('Bit layout for 8-bit types',
          '<div style="display:flex;flex-direction:column;gap:12px">'
          + '<div><div class="mem-row-title">uint8_t val = 200 → 11001000</div>' + bitStrip(200, 8) + '</div>'
          + '<div><div class="mem-row-title">int8_t val = -56 → same bits! (two\'s complement)</div>'
          + bitStrip(200, 8, ['#ef4444', '#38bdf8', '#38bdf8', '#f59e0b', '#f59e0b', '#38bdf8', '#38bdf8', '#38bdf8'])
          + '<div style="font-size:11px;color:#94a3b8;font-family:monospace;margin-top:4px">'
          + '<span style="color:#ef4444">sign bit</span> | value bits, 200 unsigned = -56 signed'
          + '</div></div></div>')

        + section('32-bit integer: little-endian layout of 305,419,896 (0x12345678)',
          memRow([memCell('0x78', 'byte[0]', '#fbbf24'), memCell('0x56', 'byte[1]', '#fb923c'),
          memCell('0x34', 'byte[2]', '#f87171'), memCell('0x12', 'byte[3]', '#c084fc')])
          + '<div style="font-size:11px;color:#94a3b8;font-family:monospace;margin-top:4px">'
          + '↑ least significant byte at lowest address (x86/x64 = little-endian)'
          + '</div>')

        + section('C++ Code', codeBlock(
          `#include <cstdint>
#include <cstring>
#include <iostream>
#include <print>

// Print every bit of any integer
template <typename T>
void printBits(T value, const char* label) {
    constexpr int bitSize = sizeof(T) * 8;
    std::print("{} ({}-bit): ", label, bitSize);
    for (int index = bitSize - 1; index >= 0; --index) {
        std::print("{}", (value >> index) & 1);
        constexpr int byteGroup = 8;

// YCbCr 4:2:0 frame (NV12 / planar layout)
struct YUVFrame {
    uint32_t        width, height;
    std::vector<uint8_t> luma;   // Y:        width * height bytes
    std::vector<uint8_t> chromaB;  // Cb: (width/2) * (height/2) bytes
    std::vector<uint8_t> chromaR;  // Cr:  (width/2) * (height/2) bytes

    YUVFrame(uint32_t widthVal, uint32_t heightVal)
        : width(widthVal),
          height(heightVal),
          luma(widthVal * heightVal, 128),
          chromaB((widthVal / 2) * (heightVal / 2), 128),
          chromaR((widthVal / 2) * (heightVal / 2), 128) {}

    size_t byteSize() const { return luma.size() + chromaB.size() + chromaR.size(); }
};

// RGB <-> YCbCr (ITU-R BT.601)
struct RGB {
    uint8_t red, green, blue;
};

void rgbToYCbCr(const RGB& pixel, uint8_t& luma, uint8_t& chromaB, uint8_t& chromaR) {
    constexpr float lumaBase = 16.0f;
    constexpr float chromaBase = 128.0f;
    luma  = static_cast<uint8_t>(lumaBase + 0.257f * pixel.red + 0.504f * pixel.green + 0.098f * pixel.blue);
    chromaB = static_cast<uint8_t>(chromaBase - 0.148f * pixel.red - 0.291f * pixel.green + 0.439f * pixel.blue);
    chromaR = static_cast<uint8_t>(chromaBase + 0.439f * pixel.red - 0.368f * pixel.green - 0.071f * pixel.blue);
}

RGB yCbCrToRGB(uint8_t luma, uint8_t chromaB, uint8_t chromaR) {
    constexpr float lumaOffset = 16.0f;
    constexpr float chromaOffset = 128.0f;
    float yVal = luma - lumaOffset, cbVal = chromaB - chromaOffset, crVal = chromaR - chromaOffset;
    auto  clamp = [](float val) -> uint8_t { 
        constexpr float maxVal = 255.0f;
        return val < 0 ? 0 : val > maxVal ? 255 : static_cast<uint8_t>(val); 
    };
    return {
        clamp(1.164f * yVal + 1.596f * crVal),
        clamp(1.164f * yVal - 0.392f * cbVal - 0.813f * crVal),
        clamp(1.164f * yVal + 2.017f * cbVal)
    };
}

// A video is a vector of frames
struct RawVideo {
    uint32_t         width, height, fps;
    std::vector<YUVFrame> frames;

    RawVideo(uint32_t widthVal, uint32_t heightVal, uint32_t fpsVal) : width(widthVal), height(heightVal), fps(fpsVal) {}

    double duration() const { return static_cast<double>(frames.size()) / fps; }
    size_t totalBytes() const { return frames.empty() ? 0 : frames[0].byteSize() * frames.size(); }
};

// Write raw YUV420 file
void writeYUV(const RawVideo& video, const char* filePath) {
    // Playback: ffplay -f rawvideo -pixel_format yuv420p -video_size WxH file.yuv
    std::ofstream file(filePath, std::ios::binary);
    for (const auto& frame : video.frames) {
        file.write(reinterpret_cast<const char*>(frame.luma.data()), frame.luma.size());
        file.write(reinterpret_cast<const char*>(frame.chromaB.data()), frame.chromaB.size());
        file.write(reinterpret_cast<const char*>(frame.chromaR.data()), frame.chromaR.size());
    }
}

#include <cstdint>
#include <fstream>
#include <iostream>

#include <print>

// Packet: the indivisible unit of A/V data
enum class StreamType : uint8_t { VIDEO = 0, AUDIO = 1 };

struct Packet {
    StreamType      type;
    int64_t         pts;  // presentation timestamp (microseconds)
    int64_t         dts;  // decode timestamp (differs for B-frames)
    bool            keyframe;
    std::vector<uint8_t> data;  // compressed payload (H.264 NAL / AAC frame)

    size_t serializedSize() const { 
        constexpr size_t headerSize = 22;
        return headerSize + data.size(); 
    }
    // 22 = 1 type + 8 pts + 8 dts + 1 flags + 4 size
};

// Muxer: collect and interleave A/V packets
struct AVMuxer {
    std::vector<Packet> packets;

    void addVideo(int64_t pts, bool key, std::vector<uint8_t> payload) {
        packets.push_back({StreamType::VIDEO, pts, pts, key, std::move(payload)});
    }
    void addAudio(int64_t pts, std::vector<uint8_t> payload) {
        packets.push_back({StreamType::AUDIO, pts, pts, true, std::move(payload)});
    }
    // Sort all packets by decode timestamp before writing
    void finalize() {
        std::sort(packets.begin(), packets.end(), [](const Packet& pktA, const Packet& pktB) {
            return pktA.dts < pktB.dts;
        });
    }
    void printTable() const {
        size_t totalBytes = 0;
        std::println("\n{:<10} {:<10} {:<6} {:<10}", "TYPE", "PTS(ms)", "KEY", "BYTES");
        std::println("──────────────────────────────────────");
        for (const auto& packet : packets) {
            constexpr int msDivisor = 1000;
            std::println(
                "{:<10} {:<10} {:<6} {:<10}",
                packet.type == StreamType::VIDEO ? "VIDEO" : "AUDIO",
                static_cast<long long>(packet.pts / msDivisor),
                packet.keyframe ? "yes" : "no",
                packet.serializedSize()
            );
            totalBytes += packet.serializedSize();
        }
        std::println("\nTotal container size: {} bytes", totalBytes);
    }
};

// Demuxer: split container back into separate streams
struct AVDemuxer {
    std::vector<Packet> video, audio;
    void           demux(const std::vector<Packet>& source) {
        for (const auto& packet : source) (packet.type == StreamType::VIDEO ? video : audio).push_back(packet);
    }
};

// A/V sync: keep video and audio aligned during playback
struct AVClock {
    int64_t videoPTS = 0, audioPTS = 0;
    void    onVideo(int64_t pts) { videoPTS = pts; }
    void    onAudio(int64_t pts) { audioPTS = pts; }
    int64_t videoLead() const { return videoPTS - audioPTS; }          // microseconds
    bool    shouldDelay() const { 
        constexpr int delayThreshold = 50000; // 50ms
        return videoLead() > delayThreshold; 
    }        
    bool    shouldDropFrame() const { 
        constexpr int dropThreshold = -100000; // 100ms
        return videoLead() < dropThreshold; 
    }  
};

// Write a minimal container file
void writeMuxed(const AVMuxer& mux, const char* filePath) {
    std::ofstream   file(filePath, std::ios::binary);
    const char magic[] = "AVMUX";
    constexpr size_t magicSize = 5;
    file.write(magic, magicSize);
    uint32_t count = static_cast<uint32_t>(mux.packets.size());
    file.write(reinterpret_cast<char*>(&count), sizeof(uint32_t));
    for (const auto& packet : mux.packets) {
        uint8_t  type  = static_cast<uint8_t>(packet.type);
        uint8_t  flags = packet.keyframe ? 1 : 0;
        uint32_t dataSize    = static_cast<uint32_t>(packet.data.size());
        file.write(reinterpret_cast<char*>(&type), sizeof(uint8_t));
        file.write(reinterpret_cast<const char*>(&packet.pts), sizeof(int64_t));
        file.write(reinterpret_cast<const char*>(&packet.dts), sizeof(int64_t));
        file.write(reinterpret_cast<char*>(&flags), sizeof(uint8_t));
        file.write(reinterpret_cast<char*>(&dataSize), sizeof(uint32_t));
        file.write(reinterpret_cast<const char*>(packet.data.data()), dataSize);
    }
}
