name: C++ CI
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release] # Debug, 
        cpp_standard: [20] # , 23
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      BUILD_DIR: ${{ github.workspace }}/build
      CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            ~/.cache/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}
          key: ${{ runner.os }}-${{ matrix.build_type }}-cmake-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-cmake-
      
      - name: Set VCPKG Triplet
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "Linux" ]; then
            echo "VCPKG_TARGET_TRIPLET=x64-linux" >> $GITHUB_ENV
          else
            if [ "$(uname -m)" == "arm64" ]; then
              echo "VCPKG_TARGET_TRIPLET=arm64-osx" >> $GITHUB_ENV
            else
              echo "VCPKG_TARGET_TRIPLET=x64-osx" >> $GITHUB_ENV
            fi
          fi

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B $BUILD_DIR \
            -DLEARNCPP_BUILD_BENCHMARKS=ON \
            -DLEARNCPP_BUILD_EXAMPLES=ON \
            -DLEARNCPP_BUILD_TESTS=ON \
            -DLEARNCPP_CXX_STANDARD=${{ matrix.cpp_standard }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

      - name: Build
        shell: bash
        run: cmake --build $BUILD_DIR --config ${{ matrix.build_type }}
        
      - name: Run tests
        shell: bash
        run: ctest --test-dir $BUILD_DIR --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Install WiX v4
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          dotnet tool install --global wix
          wix extension add --global WixToolset.UI.wixext
          
      - name: Package Development
        shell: bash
        if: matrix.build_type == 'Release'
        run: cd $BUILD_DIR && cpack -C ${{ matrix.build_type }}

      - name: Upload Development Package Artifact
        uses: actions/upload-artifact@v4
        if: matrix.build_type == 'Release'
        with:
          name: Greeter-Package-${{ matrix.os }}-${{ matrix.build_type }}
          path: ${{ env.BUILD_DIR }}/*.zip

      - name: Package Application
        shell: bash
        if: matrix.os == 'windows-latest' && matrix.build_type == 'Release'
        run: cd $BUILD_DIR && cpack -C ${{ matrix.build_type }}

      - name: Upload Application Package Artifact
        if: matrix.os == 'windows-latest' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: Greeter-Installer-${{ matrix.os }}
          path: ${{ env.BUILD_DIR }}/*.msi
